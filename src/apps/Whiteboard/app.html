<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whiteboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e2e;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }

        .whiteboard-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: rgba(30, 30, 46, 0.95);
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.5rem;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .toolbar-divider {
            width: 1px;
            height: 30px;
            background: rgba(255, 255, 255, 0.2);
        }

        .tool-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #ffffff;
            padding: 0.5rem 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tool-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(99, 102, 241, 0.5);
        }

        .tool-btn.active {
            background: rgba(99, 102, 241, 0.4);
            border-color: rgba(99, 102, 241, 0.6);
        }

        .tool-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }

        .color-picker {
            width: 40px;
            height: 32px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            cursor: pointer;
            background: #000000;
        }

        .size-slider {
            width: 100px;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }

        .size-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            min-width: 30px;
        }

        .canvas-container {
            flex: 1;
            position: relative;
            background: #ffffff;
            margin: 1rem;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        #canvas {
            display: block;
            cursor: crosshair;
        }

        #canvas.eraser {
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"><circle cx="10" cy="10" r="8" fill="white" stroke="black" stroke-width="2"/></svg>') 10 10, auto;
        }

        .board-name-input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #ffffff;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            min-width: 150px;
        }

        .board-name-input:focus {
            outline: none;
            border-color: rgba(99, 102, 241, 0.6);
            background: rgba(255, 255, 255, 0.15);
        }

        .save-status {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            margin-left: auto;
        }

        .save-status.saving {
            color: rgba(255, 165, 0, 0.8);
        }

        .save-status.saved {
            color: rgba(0, 255, 0, 0.8);
        }

        /* Load board modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: rgba(30, 30, 46, 0.98);
            border: 1px solid rgba(99, 102, 241, 0.5);
            border-radius: 12px;
            padding: 2rem;
            min-width: 400px;
            max-width: 500px;
            max-height: 70vh;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h2 {
            color: #ffffff;
            font-size: 1.5rem;
            margin: 0;
        }

        .modal-close {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            border-radius: 6px;
            padding: 0.5rem;
            cursor: pointer;
            font-size: 1.2rem;
            width: 2rem;
            height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .board-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 1rem;
        }

        .board-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 0.875rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .board-item:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.5);
            transform: translateX(5px);
        }

        .board-item-icon {
            font-size: 1.2rem;
        }

        .board-item-name {
            flex: 1;
            color: #ffffff;
            font-size: 1rem;
        }

        .board-item-delete {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.45);
            color: #fca5a5;
            border-radius: 6px;
            padding: 0.35rem 0.65rem;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .board-item-delete:hover {
            background: rgba(239, 68, 68, 0.35);
            border-color: rgba(239, 68, 68, 0.7);
            color: #ffffff;
        }

        .no-boards {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            padding: 2rem;
            font-style: italic;
        }

        /* Confirmation Modal */
        .confirm-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        .confirm-modal.active {
            display: flex;
        }

        .confirm-content {
            background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 12px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .confirm-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 1rem;
        }

        .confirm-message {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .confirm-buttons {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        .confirm-btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .confirm-btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        .confirm-btn-cancel:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .confirm-btn-confirm {
            background: #ef4444;
            color: #ffffff;
        }

        .confirm-btn-confirm:hover {
            background: #dc2626;
        }

        /* Alert/Prompt Modal */
        .message-modal,
        .prompt-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        .message-modal.active,
        .prompt-modal.active {
            display: flex;
        }

        .message-content,
        .prompt-content {
            background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 12px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .message-title,
        .prompt-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 1rem;
        }

        .message-text,
        .prompt-message {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .prompt-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            outline: none;
            margin-bottom: 1.5rem;
        }

        .toast {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            background: rgba(0, 0, 0, 0.85);
            color: #ffffff;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 11000;
        }

        .toast.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- Load Board Modal -->
    <div class="modal-overlay" id="loadModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Load Board</h2>
                <button class="modal-close" onclick="closeLoadModal()">✕</button>
            </div>
            <div class="board-list" id="boardList">
                <p class="no-boards">Loading...</p>
            </div>
        </div>
    </div>
    <div class="whiteboard-container">
        <div class="toolbar">
            <div class="toolbar-group">
                <input type="text" id="boardName" class="board-name-input" placeholder="Board Name" value="untitled">
            </div>

            <div class="toolbar-divider"></div>

            <div class="toolbar-group">
                <button class="tool-btn active" id="penBtn" onclick="selectTool('pen')">
                    Pen
                </button>
                <button class="tool-btn" id="eraserBtn" onclick="selectTool('eraser')">
                    Eraser
                </button>
            </div>

            <div class="toolbar-divider"></div>

            <div class="toolbar-group">
                <input type="color" id="colorPicker" class="color-picker" value="#000000">
            </div>

            <div class="toolbar-divider"></div>

            <div class="toolbar-group">
                <span class="size-label" id="sizeLabel">5px</span>
                <input type="range" id="sizeSlider" class="size-slider" min="1" max="50" value="5">
            </div>

            <div class="toolbar-divider"></div>

            <div class="toolbar-group">
                <button class="tool-btn" id="undoBtn" onclick="undoStroke()" disabled>
                    Undo
                </button>
                <button class="tool-btn" id="redoBtn" onclick="redoStroke()" disabled>
                    Redo
                </button>
                <button class="tool-btn" onclick="clearCanvas()">
                    Clear
                </button>
                <button class="tool-btn" onclick="saveBoard()">
                    Save
                </button>
                <button class="tool-btn" onclick="showLoadModal()">
                    Load
                </button>
            </div>

            <span class="save-status" id="saveStatus"></span>
        </div>

        <div class="canvas-container" id="canvasContainer">
            <canvas id="canvas"></canvas>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div class="confirm-modal" id="confirmModal">
        <div class="confirm-content">
            <div class="confirm-title" id="confirmTitle">Confirm Action</div>
            <div class="confirm-message" id="confirmMessage">Are you sure?</div>
            <div class="confirm-buttons">
                <button class="confirm-btn confirm-btn-cancel" id="confirmCancel">Cancel</button>
                <button class="confirm-btn confirm-btn-confirm" id="confirmOk">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Alert Modal -->
    <div class="message-modal" id="messageModal">
        <div class="message-content">
            <div class="message-title" id="messageTitle">Message</div>
            <div class="message-text" id="messageText">Something happened.</div>
            <div class="confirm-buttons">
                <button class="confirm-btn confirm-btn-confirm" id="messageOk">OK</button>
            </div>
        </div>
    </div>

    <!-- Prompt Modal -->
    <div class="prompt-modal" id="promptModal">
        <div class="prompt-content">
            <div class="prompt-title" id="promptTitle">Enter value</div>
            <div class="prompt-message" id="promptMessage">Please enter a value below.</div>
            <input class="prompt-input" id="promptInput" type="text" />
            <div class="confirm-buttons">
                <button class="confirm-btn confirm-btn-cancel" id="promptCancel">Cancel</button>
                <button class="confirm-btn confirm-btn-confirm" id="promptOk">OK</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script>
        (function() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const colorPicker = document.getElementById('colorPicker');
            const sizeSlider = document.getElementById('sizeSlider');
            const sizeLabel = document.getElementById('sizeLabel');
            const boardNameInput = document.getElementById('boardName');
            const saveStatus = document.getElementById('saveStatus');

            let isDrawing = false;
            let currentTool = 'pen';
            let currentColor = '#000000';
            let currentSize = 5;
            let drawingData = [];
            let redoStack = [];
            let confirmCallback = null;

            // Custom confirm modal functions
            function showConfirmModal(title, message) {
                return new Promise((resolve) => {
                    document.getElementById('confirmTitle').textContent = title;
                    document.getElementById('confirmMessage').textContent = message;
                    document.getElementById('confirmModal').classList.add('active');
                    confirmCallback = resolve;
                });
            }

            function closeConfirmModal(confirmed) {
                document.getElementById('confirmModal').classList.remove('active');
                if (confirmCallback) {
                    confirmCallback(confirmed);
                    confirmCallback = null;
                }
            }

            // Message / prompt modal helpers
            function showMessageModal(title, message) {
                return new Promise((resolve) => {
                    document.getElementById('messageTitle').textContent = title;
                    document.getElementById('messageText').textContent = message;
                    const modal = document.getElementById('messageModal');
                    modal.classList.add('active');

                    const onOk = () => {
                        modal.classList.remove('active');
                        document.getElementById('messageOk').removeEventListener('click', onOk);
                        resolve();
                    };

                    document.getElementById('messageOk').addEventListener('click', onOk);
                });
            }

            function showPromptModal(title, message, defaultValue = '') {
                return new Promise((resolve) => {
                    document.getElementById('promptTitle').textContent = title;
                    document.getElementById('promptMessage').textContent = message;
                    const input = document.getElementById('promptInput');
                    input.value = defaultValue;

                    const modal = document.getElementById('promptModal');
                    modal.classList.add('active');

                    const cleanup = () => {
                        modal.classList.remove('active');
                        document.getElementById('promptOk').removeEventListener('click', onOk);
                        document.getElementById('promptCancel').removeEventListener('click', onCancel);
                    };

                    const onOk = () => {
                        cleanup();
                        resolve(input.value);
                    };

                    const onCancel = () => {
                        cleanup();
                        resolve(null);
                    };

                    document.getElementById('promptOk').addEventListener('click', onOk);
                    document.getElementById('promptCancel').addEventListener('click', onCancel);

                    // Focus input for convenience
                    setTimeout(() => input.focus(), 0);
                });
            }

            function showToast(message, duration = 2000) {
                const toast = document.getElementById('toast');
                toast.textContent = message;
                toast.classList.add('visible');
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(() => {
                    toast.classList.remove('visible');
                }, duration);
            }

            function getLaunchFilePath() {
                const byApp = window.__SANCTUM_LAUNCH_CONTEXT_BY_APP || {};
                const whiteboardContext = byApp['Whiteboard'];
                if (whiteboardContext && typeof whiteboardContext.filePath === 'string' && whiteboardContext.filePath.trim()) {
                    return whiteboardContext.filePath;
                }

                const fallbackContext = window.__SANCTUM_LAUNCH_CONTEXT || null;
                if (fallbackContext && typeof fallbackContext.filePath === 'string' && fallbackContext.filePath.trim()) {
                    return fallbackContext.filePath;
                }

                return null;
            }

            function getBoardNameFromPath(path) {
                const normalized = String(path || '').replace(/\\/g, '/');
                const fileName = normalized.split('/').pop() || 'untitled';
                return fileName.endsWith('.json') ? fileName.slice(0, -5) : fileName;
            }

            function normalizeDrawingData(parsedData) {
                if (Array.isArray(parsedData)) {
                    return parsedData;
                }
                if (parsedData && Array.isArray(parsedData.data)) {
                    return parsedData.data;
                }
                if (parsedData && Array.isArray(parsedData.drawingData)) {
                    return parsedData.drawingData;
                }
                if (parsedData && Array.isArray(parsedData.strokes)) {
                    return parsedData.strokes;
                }
                return null;
            }

            function updateHistoryButtons() {
                const undoBtn = document.getElementById('undoBtn');
                const redoBtn = document.getElementById('redoBtn');
                if (undoBtn) {
                    undoBtn.disabled = drawingData.length === 0;
                }
                if (redoBtn) {
                    redoBtn.disabled = redoStack.length === 0;
                }
            }

            function getLastStrokeStartIndex() {
                for (let i = drawingData.length - 1; i >= 0; i--) {
                    if (drawingData[i] && drawingData[i].newStroke) {
                        return i;
                    }
                }
                return drawingData.length > 0 ? 0 : -1;
            }

            async function loadInjectedBoardFromLaunchContext() {
                const injectedPath = getLaunchFilePath();
                if (!injectedPath || !String(injectedPath).toLowerCase().endsWith('.json')) {
                    return;
                }

                try {
                    const content = await window.pywebview.api.read_file(injectedPath);
                    if (!content || !String(content).trim()) {
                        await showMessageModal('Open Failed', 'Injected board file is empty.');
                        return;
                    }

                    const parsed = JSON.parse(content);
                    const loadedData = normalizeDrawingData(parsed);

                    if (!Array.isArray(loadedData)) {
                        await showMessageModal('Open Failed', 'This JSON file is not a valid whiteboard format.');
                        return;
                    }

                    drawingData = loadedData;
                    redoStack = [];
                    boardNameInput.value = getBoardNameFromPath(injectedPath) || 'untitled';
                    redrawCanvas();
                    updateHistoryButtons();

                    saveStatus.textContent = 'Injected board loaded ✓';
                    saveStatus.className = 'save-status saved';
                    setTimeout(() => {
                        saveStatus.textContent = '';
                        saveStatus.className = 'save-status';
                    }, 2200);
                } catch (error) {
                    console.error('Error loading injected board:', error);
                    await showMessageModal('Open Failed', 'Could not load injected board JSON: ' + (error.message || error));
                }
            }


            // Set up modal button handlers
            document.getElementById('confirmCancel').addEventListener('click', () => closeConfirmModal(false));
            document.getElementById('confirmOk').addEventListener('click', () => closeConfirmModal(true));

            // Initialize canvas size
            function resizeCanvas() {
                const container = document.getElementById('canvasContainer');
                canvas.width = container.clientWidth;
                canvas.height = container.clientHeight;
                redrawCanvas();
            }

            // Set up canvas
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            updateHistoryButtons();

            // Tool selection
            window.selectTool = function(tool) {
                currentTool = tool;
                document.getElementById('penBtn').classList.toggle('active', tool === 'pen');
                document.getElementById('eraserBtn').classList.toggle('active', tool === 'eraser');
                canvas.classList.toggle('eraser', tool === 'eraser');
            };

            // Color picker
            colorPicker.addEventListener('change', (e) => {
                currentColor = e.target.value;
                if (currentTool === 'eraser') {
                    window.selectTool('pen');
                }
            });

            // Size slider
            sizeSlider.addEventListener('input', (e) => {
                currentSize = parseInt(e.target.value);
                sizeLabel.textContent = currentSize + 'px';
            });

            // Drawing functions
            function startDrawing(e) {
                isDrawing = true;
                const pos = getMousePos(e);
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);

                if (redoStack.length > 0) {
                    redoStack = [];
                }
                
                // Mark this as the start of a new stroke
                drawingData.push({
                    tool: currentTool,
                    color: currentColor,
                    size: currentSize,
                    x: pos.x,
                    y: pos.y,
                    newStroke: true
                });

                updateHistoryButtons();
            }

            function draw(e) {
                if (!isDrawing) return;

                const pos = getMousePos(e);
                
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.lineWidth = currentSize;
                
                if (currentTool === 'eraser') {
                    ctx.globalCompositeOperation = 'destination-out';
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.strokeStyle = currentColor;
                }

                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();

                // Store drawing data (continuing the stroke)
                drawingData.push({
                    tool: currentTool,
                    color: currentColor,
                    size: currentSize,
                    x: pos.x,
                    y: pos.y
                });
            }

            function stopDrawing() {
                if (isDrawing) {
                    isDrawing = false;
                    ctx.beginPath();
                }
            }

            function getMousePos(e) {
                const rect = canvas.getBoundingClientRect();
                // Handle both mouse and touch events
                let clientX, clientY;
                
                if (e.touches && e.touches.length > 0) {
                    // Touch event
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else if (e.changedTouches && e.changedTouches.length > 0) {
                    // Touch end event
                    clientX = e.changedTouches[0].clientX;
                    clientY = e.changedTouches[0].clientY;
                } else {
                    // Mouse event
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                
                return {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            }

            // Wrapper functions to prevent default touch behavior
            function handleTouchStart(e) {
                e.preventDefault();
                startDrawing(e);
            }

            function handleTouchMove(e) {
                e.preventDefault();
                draw(e);
            }

            function handleTouchEnd(e) {
                e.preventDefault();
                stopDrawing();
            }

            // Event listeners for mouse
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);

            // Event listeners for touch
            canvas.addEventListener('touchstart', handleTouchStart);
            canvas.addEventListener('touchmove', handleTouchMove);
            canvas.addEventListener('touchend', handleTouchEnd);
            canvas.addEventListener('touchcancel', handleTouchEnd);

            // Clear canvas
            window.clearCanvas = async function() {
                const confirmed = await showConfirmModal(
                    'Clear Whiteboard',
                    'Are you sure you want to clear the whiteboard?'
                );
                if (confirmed) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    drawingData = [];
                    redoStack = [];
                    updateHistoryButtons();
                }
            };

            window.undoStroke = function() {
                if (drawingData.length === 0) {
                    return;
                }

                const strokeStart = getLastStrokeStartIndex();
                if (strokeStart < 0) {
                    return;
                }

                const removedStroke = drawingData.slice(strokeStart);
                drawingData = drawingData.slice(0, strokeStart);
                redoStack.push(removedStroke);

                redrawCanvas();
                updateHistoryButtons();
            };

            window.redoStroke = function() {
                if (redoStack.length === 0) {
                    return;
                }

                const restoredStroke = redoStack.pop();
                drawingData = drawingData.concat(restoredStroke);

                redrawCanvas();
                updateHistoryButtons();
            };

            // Redraw canvas from data
            function redrawCanvas() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if (drawingData.length === 0) return;

                let currentPath = null;

                drawingData.forEach((point, index) => {
                    // Start a new path if:
                    // 1. It's the first point
                    // 2. The point is marked as a new stroke
                    // 3. Tool/color/size changed
                    if (index === 0 || point.newStroke || 
                        drawingData[index - 1].tool !== point.tool || 
                        drawingData[index - 1].color !== point.color || 
                        drawingData[index - 1].size !== point.size) {
                        
                        if (currentPath) {
                            ctx.stroke();
                        }
                        
                        ctx.beginPath();
                        ctx.moveTo(point.x, point.y);
                        ctx.lineCap = 'round';
                        ctx.lineJoin = 'round';
                        ctx.lineWidth = point.size;
                        
                        if (point.tool === 'eraser') {
                            ctx.globalCompositeOperation = 'destination-out';
                        } else {
                            ctx.globalCompositeOperation = 'source-over';
                            ctx.strokeStyle = point.color;
                        }
                        
                        currentPath = true;
                    } else {
                        ctx.lineTo(point.x, point.y);
                    }
                });

                if (currentPath) {
                    ctx.stroke();
                }
                
                // Reset canvas state for normal drawing
                ctx.beginPath();
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = currentSize;
            }

            // Save board
            window.saveBoard = async function() {
                const boardName = boardNameInput.value.trim() || 'untitled';
                
                saveStatus.textContent = 'Saving...';
                saveStatus.className = 'save-status saving';

                try {
                    const result = await window.pywebview.api.call_app_function(
                        'Whiteboard',
                        'save_board',
                        boardName,
                        drawingData
                    );

                    if (result.success) {
                        saveStatus.textContent = 'Saved ✓';
                        saveStatus.className = 'save-status saved';
                        setTimeout(() => {
                            saveStatus.textContent = '';
                            saveStatus.className = 'save-status';
                        }, 2000);
                    } else {
                        saveStatus.textContent = 'Save failed';
                        saveStatus.className = 'save-status';
                    }
                } catch (error) {
                    console.error('Error saving board:', error);
                    saveStatus.textContent = 'Save failed';
                    saveStatus.className = 'save-status';
                }
            };

            // Load board modal
            window.showLoadModal = async function() {
                const modal = document.getElementById('loadModal');
                const boardList = document.getElementById('boardList');
                
                modal.classList.add('active');
                boardList.innerHTML = '<p class="no-boards">Loading...</p>';
                
                try {
                    const result = await window.pywebview.api.call_app_function(
                        'Whiteboard',
                        'list_boards'
                    );
                    
                    if (result.success && result.boards.length > 0) {
                        boardList.innerHTML = result.boards.map(boardName => `
                            <div class="board-item" onclick="loadBoardByName('${boardName}')">
                                <span class="board-item-icon">📄</span>
                                <span class="board-item-name">${boardName}</span>
                                <button class="board-item-delete" onclick="deleteBoard('${boardName}', event)">Delete</button>
                            </div>
                        `).join('');
                    } else {
                        boardList.innerHTML = '<p class="no-boards">No saved boards found</p>';
                    }
                } catch (error) {
                    console.error('Error listing boards:', error);
                    boardList.innerHTML = '<p class="no-boards">Error loading boards</p>';
                }
            };
            
            window.closeLoadModal = function() {
                document.getElementById('loadModal').classList.remove('active');
            };

            window.deleteBoard = async function(boardName, event) {
                if (event) {
                    event.stopPropagation();
                }

                const confirmed = await showConfirmModal(
                    'Delete Board',
                    `Delete board "${boardName}"?`
                );
                if (!confirmed) {
                    return;
                }

                try {
                    const result = await window.pywebview.api.call_app_function(
                        'Whiteboard',
                        'delete_board',
                        boardName
                    );

                    if (result.success) {
                        showToast(`Deleted: ${boardName}`);
                        await showLoadModal();
                    } else {
                        await showMessageModal('Error', 'Failed to delete board: ' + (result.error || 'Unknown error'));
                    }
                } catch (error) {
                    console.error('Error deleting board:', error);
                    await showMessageModal('Error', 'Error deleting board: ' + error.message);
                }
            };

            // Load board by name
            window.loadBoardByName = async function(boardName) {
                closeLoadModal();
                
                try {
                    console.log('Loading board:', boardName);
                    const result = await window.pywebview.api.call_app_function(
                        'Whiteboard',
                        'load_board',
                        boardName
                    );

                    console.log('Load result:', result);

                    if (result.success) {
                        drawingData = result.data;
                        redoStack = [];
                        console.log('Loaded drawing data:', drawingData.length, 'points');
                        boardNameInput.value = boardName;
                        redrawCanvas();
                        updateHistoryButtons();
                        saveStatus.textContent = 'Loaded ✓';
                        saveStatus.className = 'save-status saved';
                        setTimeout(() => {
                            saveStatus.textContent = '';
                            saveStatus.className = 'save-status';
                        }, 2000);
                    } else {
                        console.error('Load failed:', result.error);
                        await showMessageModal('Error', 'Failed to load board: ' + (result.error || 'Unknown error'));
                    }
                } catch (error) {
                    console.error('Error loading board:', error);
                    await showMessageModal('Error', 'Error loading board: ' + error.message);
                }
            };

            // Load board (legacy - now uses modal)
            window.loadBoard = async function() {
                const boardName = boardNameInput.value.trim() || 'untitled';

                try {
                    console.log('Loading board:', boardName);
                    const result = await window.pywebview.api.call_app_function(
                        'Whiteboard',
                        'load_board',
                        boardName
                    );

                    console.log('Load result:', result);

                    if (result.success) {
                        drawingData = result.data;
                        redoStack = [];
                        console.log('Loaded drawing data:', drawingData.length, 'points');
                        redrawCanvas();
                        updateHistoryButtons();
                        saveStatus.textContent = 'Loaded ✓';
                        saveStatus.className = 'save-status saved';
                        setTimeout(() => {
                            saveStatus.textContent = '';
                            saveStatus.className = 'save-status';
                        }, 2000);
                    } else {
                        console.error('Load failed:', result.error);
                        await showMessageModal('Error', 'Failed to load board: ' + (result.error || 'Unknown error'));
                    }
                } catch (error) {
                    console.error('Error loading board:', error);
                    await showMessageModal('Error', 'Error loading board: ' + error.message);
                }
            };

            // Auto-save every 30 seconds
            setInterval(() => {
                if (drawingData.length > 0) {
                    window.saveBoard();
                }
            }, 30000);

            document.addEventListener('keydown', (event) => {
                if (!(event.ctrlKey || event.metaKey)) {
                    return;
                }

                const key = String(event.key || '').toLowerCase();
                if (key === 'z' && !event.shiftKey) {
                    event.preventDefault();
                    window.undoStroke();
                } else if (key === 'y' || (key === 'z' && event.shiftKey)) {
                    event.preventDefault();
                    window.redoStroke();
                }
            });

            // If Whiteboard was launched with a .json path, load it immediately.
            setTimeout(() => {
                loadInjectedBoardFromLaunchContext();
            }, 50);
        })();
    </script>
</body>
</html>
